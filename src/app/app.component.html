<h2>Liczba kursow {{kursy.length}}</h2>
<ol>
    @for (kurs of kursy; track $index) {
      <li>{{kurs}}</li>
    } 
</ol>
<form>
  <div class="form-group">
    <label for="nameAndSurname">Imie i nazwisko: </label>
    <input name="nameAndSurname" type="text" [(ngModel)] = "imie" class="form-control" id="nameAndSurname">
  </div>
    <div class="form-group">
    <label for="nrkursu">Nr kursu: </label>
    <input name = "nrkursu" type="number" [(ngModel)] = "nrKursu" class="form-control" id="nrkursu">
  </div>
  <button (click)="zapizsNaKurs()" class="btn btn-primary ">Zapisz do kursu</button>
</form>

<hr>

<select [(ngModel)] = "jezyk">
  @for (jezyk of jezyki; track $index) {
    <option >{{jezyk}}</option>
  }
</select>
<button (click)="wyswietl()">zatwierdz</button>
<table>
  <tr>
    <th>
      LP
    </th>
    <th>
      Jezyk
    </th>
  </tr>
    @for (item of jezyki; track $index) {
      <tr>
        <td>{{$index+1}}</td>
        <td>{{item}}</td>
      </tr>
      
      
    }
</table>
